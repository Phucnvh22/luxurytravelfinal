name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/luxury-travel-backend:latest
            ghcr.io/${{ github.repository_owner }}/luxury-travel-backend:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/luxury-travel-frontend:latest
            ghcr.io/${{ github.repository_owner }}/luxury-travel-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_push
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add known_hosts
        run: |
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload docker-compose.yml
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${{ secrets.VPS_APP_DIR }}'"
          scp -P "${{ secrets.VPS_SSH_PORT }}" docker-compose.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/docker-compose.yml"

      - name: Deploy
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "\
            set -e; \
            cd '${{ secrets.VPS_APP_DIR }}'; \
            export GHCR_OWNER='${{ github.repository_owner }}'; \
            export IMAGE_TAG=latest; \
            if [ -n '${{ secrets.GHCR_TOKEN }}' ]; then docker login ghcr.io -u '${{ github.repository_owner }}' -p '${{ secrets.GHCR_TOKEN }}'; fi; \
            docker compose pull; \
            docker compose up -d; \
            docker image prune -f \
          "
