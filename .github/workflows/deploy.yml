name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set GHCR owner lowercase
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/luxury-travel-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/luxury-travel-backend:${{ github.sha }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/luxury-travel-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/luxury-travel-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_push
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate VPS secrets
        run: |
          if [ -z '${{ secrets.VPS_HOST }}' ]; then echo 'Missing secret VPS_HOST'; exit 1; fi
          if [ -z '${{ secrets.VPS_USER }}' ]; then echo 'Missing secret VPS_USER'; exit 1; fi
          if [ -z '${{ secrets.VPS_APP_DIR }}' ]; then echo 'Missing secret VPS_APP_DIR'; exit 1; fi
          if [ -z '${{ secrets.VPS_SSH_KEY }}' ]; then echo 'Missing secret VPS_SSH_KEY'; exit 1; fi

      - name: Write SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Upload docker-compose.yml
        run: |
          PORT="${{ secrets.VPS_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${{ secrets.VPS_APP_DIR }}'"
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -P "$PORT" docker-compose.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_APP_DIR }}/docker-compose.yml"

      - name: Deploy
        run: |
          PORT="${{ secrets.VPS_SSH_PORT }}"
          if [ -z "$PORT" ]; then PORT=22; fi
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "\
            set -e; \
            cd '${{ secrets.VPS_APP_DIR }}'; \
            export GHCR_OWNER='${{ github.repository_owner }}'; \
            export GHCR_OWNER=\$(echo \"\$GHCR_OWNER\" | tr '[:upper:]' '[:lower:]'); \
            export IMAGE_TAG=latest; \
            if [ -n '${{ secrets.GHCR_TOKEN }}' ]; then docker login ghcr.io -u \"\$GHCR_OWNER\" -p '${{ secrets.GHCR_TOKEN }}'; fi; \
            docker compose pull; \
            docker compose up -d; \
            docker image prune -f \
          "
